# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-joudar"
BBFILE_PATTERN_meta-joudar = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-joudar = "6"

LAYERDEPENDS_meta-joudar = "core"
LAYERSERIES_COMPAT_meta-joudar = "scarthgap"
