[system]
compatible=beaglebone
bootloader=uboot
#bundle-formats=-plain

[slot.boot.0]
device=/dev/mmcblk0p1
type=fat
#parent=rootfs.0

[slot.boot.1]
device=/dev/mmcblk0p2
type=fat
#parent=rootfs.1


[slot.rootfs.0]
device=/dev/mmcblk0p3
type=ext4
bootname=boot0

[slot.rootfs.1]
device=/dev/mmcblk0p4
type=ext4
bootname=boot1
