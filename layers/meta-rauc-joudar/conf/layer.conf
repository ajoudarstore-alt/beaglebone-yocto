# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-rauc-joudar"
BBFILE_PATTERN_meta-rauc-joudar = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-rauc-joudar = "9"


LAYERDEPENDS_meta-rauc-joudar = "core rauc"
LAYERSERIES_COMPAT_meta-rauc-joudar = "scarthgap"
