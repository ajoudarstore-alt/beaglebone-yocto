header:
  version: 14

local_conf_header:
  standard: |
    CONF_VERSION = "2"
    PACKAGE_CLASSES = "package_deb"

  add-boot: |
    IMAGE_INSTALL:append = " rauc"
    WKS_FILE:forcevariable = "beaglebone-ota.wks"

  network: |
    BB_GENERATE_MIRROR_TARBALLS = "1"
    BB_NO_NETWORK = "0"
    
  diskmon: |
    BB_DISKMON_DIRS = "STOPTASKS,${TMPDIR},1G,100K STOPTASKS,${DL_DIR},1G,100K STOPTASKS,${SSTATE_DIR},1G,100K STOPTASKS,/tmp,100M,100K HALT,${TMPDIR},100M,1K HALT,${DL_DIR},100M,1K HALT,${SSTATE_DIR},100M,1K HALT,/tmp,10M,1K"

  shared: |
    DL_DIR = "/yocto_shared/downloads"
    SSTATE_DIR = "/yocto_shared/sstate-cache"
  
  buildhistory: |
    INHERIT += "buildhistory"
    BUILDHISTORY_COMMIT = "1"
  
  kernel: |
    PREFERRED_PROVIDER_virtual/kernel = "linux-bb.org"
    PREFERRED_PROVIDER_virtual/bootloader = "u-boot"