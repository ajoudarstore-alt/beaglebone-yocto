# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-joudar-distro"
BBFILE_PATTERN_meta-joudar-distro = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-joudar-distro = "6"

LAYERDEPENDS_meta-joudar-distro = "core rauc"
LAYERSERIES_COMPAT_meta-joudar-distro = "scarthgap"